<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapCute Photobooth</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#ffe4ec,#e0f7ff);
    text-align: center;
}

/* LOADING */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 25px;
    z-index: 9999;
}

/* FLASH */
.flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
}

/* BRAND */
.brand h2 {
    color: #ff6fa5;
}
.brand p {
    font-size: 12px;
    color: #888;
}

/* GLASS */
.glass {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 20px;
    margin: 20px;
}

/* CAMERA */
video {
    width: 250px;
    border-radius: 20px;
}

/* BUTTON */
button {
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    margin: 5px;
    background: linear-gradient(45deg,#ff9ecb,#ff7eb3);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* FRAME */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.frame {
    width: 180px;
    padding: 10px;
    border-radius: 20px;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.frame:hover {
    transform: translateY(-8px) scale(1.05);
}

.frame::after {
    content: "💖";
    position: absolute;
    bottom: 5px;
    right: 10px;
}

/* COLORS */
.pink { background: linear-gradient(#ffd6e0,#ffb6c1); }
.blue { background: linear-gradient(#cce5ff,#99ccff); }
.yellow { background: linear-gradient(#fff0c9,#f5d88a); }

/* PHOTO */
.photo {
    height: 60px;
    background: white;
    margin: 6px 0;
    border-radius: 10px;
    background-size: cover;
}

/* STICKERS */
.stickers span {
    font-size: 25px;
    cursor: grab;
    margin: 5px;
}

/* DRAG */
.draggable {
    position: absolute;
    font-size: 25px;
    cursor: move;
}

/* COUNTDOWN */
#countdown {
    font-size: 50px;
    color: #ff4d6d;
}

/* INPUT */
input {
    padding: 10px;
    border-radius: 20px;
    border: none;
}

/* MOBILE */
@media (max-width:600px){
    video { width: 90%; }
    .frame { width: 140px; }
}
</style>
</head>

<body>

<div id="loading">💖 Loading...</div>
<div id="flash" class="flash"></div>

<div class="brand">
    <h2>📸 SnapCute</h2>
    <p>Capture your aesthetic moment</p>
</div>

<div class="glass">
    <video id="camera" autoplay></video>
    <div id="countdown"></div>

    <br>

    <button onclick="capture()">📸 Foto</button>
    <button onclick="autoPhoto()">🎞 Auto</button>

    <br>

    <button onclick="setFilter('')">Normal</button>
    <button onclick="setFilter('filter-pink')">💖 Pink</button>
    <button onclick="setFilter('filter-vintage')">📼 Vintage</button>
    <button onclick="setFilter('filter-bw')">⚫ B&W</button>

    <br>

    <input type="text" id="textInput" placeholder="Tambah text...">
    <button onclick="addText()">✍️</button>

    <div class="stickers">
        <span draggable="true">💖</span>
        <span draggable="true">🎀</span>
        <span draggable="true">⭐</span>
        <span draggable="true">🦋</span>
        <span draggable="true">🌈</span>
    </div>
</div>

<div class="glass">
    <h3>🎨 Pilih Template</h3>

    <div class="container">
        <div class="frame pink" onclick="selectFrame(this)">
            <div class="photo"></div>
            <div class="photo"></div>
            <div class="photo"></div>
            <div class="photo"></div>
        </div>

        <div class="frame blue" onclick="selectFrame(this)">
            <div class="photo"></div>
            <div class="photo"></div>
            <div class="photo"></div>
        </div>

        <div class="frame yellow" onclick="selectFrame(this)">
            <div class="photo"></div>
            <div class="photo"></div>
        </div>
    </div>
</div>

<button onclick="download()">💾 Download</button>

<footer style="margin:20px; font-size:12px; color:#999;">
Made with 💖 by You
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
let video = document.getElementById("camera");
let selectedFrame = document.querySelector(".frame");
const snapSound = new Audio("https://www.soundjay.com/camera/camera-shutter.mp3");

/* LOADING */
window.onload = () => {
    document.getElementById("loading").style.display = "none";
}

/* CAMERA */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

/* SELECT FRAME */
function selectFrame(frame) {
    selectedFrame = frame;
}

/* FILTER */
function setFilter(f) {
    video.className = f;
}

/* CAPTURE */
function capture() {
    let flash = document.getElementById("flash");
    flash.style.opacity = "1";
    setTimeout(() => flash.style.opacity = "0", 100);

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.filter = getComputedStyle(video).filter;
    ctx.drawImage(video, 0, 0);

    const img = canvas.toDataURL();

    const slots = selectedFrame.querySelectorAll(".photo");

    for (let i = 0; i < slots.length; i++) {
        if (!slots[i].style.backgroundImage) {
            slots[i].style.backgroundImage = `url(${img})`;
            snapSound.play();
            break;
        }
    }
}

/* AUTO */
async function autoPhoto() {
    let slots = selectedFrame.querySelectorAll(".photo");

    for (let i = 0; i < slots.length; i++) {
        await countdown(3);
        capture();
    }
}

/* COUNTDOWN */
function countdown(sec) {
    return new Promise(resolve => {
        let el = document.getElementById("countdown");
        let c = sec;

        let interval = setInterval(() => {
            el.innerText = c;
            c--;

            if (c < 0) {
                clearInterval(interval);
                el.innerText = "";
                resolve();
            }
        }, 1000);
    });
}

/* TEXT */
function addText() {
    let text = document.getElementById("textInput").value;

    let el = document.createElement("div");
    el.innerText = text;
    el.className = "draggable";
    el.style.top = "40px";
    el.style.left = "20px";

    selectedFrame.appendChild(el);
    dragElement(el);
}

/* DRAG */
function dragElement(el) {
    el.onmousedown = function(e) {
        let shiftX = e.clientX - el.getBoundingClientRect().left;
        let shiftY = e.clientY - el.getBoundingClientRect().top;

        function moveAt(x,y) {
            el.style.left = x - shiftX + "px";
            el.style.top = y - shiftY + "px";
        }

        function onMouseMove(e) {
            moveAt(e.pageX, e.pageY);
        }

        document.addEventListener("mousemove", onMouseMove);

        document.onmouseup = function() {
            document.removeEventListener("mousemove", onMouseMove);
            document.onmouseup = null;
        };
    };
}

/* STICKER */
document.querySelectorAll(".stickers span").forEach(sticker => {
    sticker.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text", e.target.innerText);
    });
});

document.querySelectorAll(".frame").forEach(frame => {
    frame.addEventListener("dragover", e => e.preventDefault());

    frame.addEventListener("drop", e => {
        const data = e.dataTransfer.getData("text");

        let el = document.createElement("div");
        el.innerText = data;
        el.className = "draggable";
        el.style.top = "50px";
        el.style.left = "50px";

        frame.appendChild(el);
        dragElement(el);
    });
});

/* DOWNLOAD */
function download() {
    html2canvas(selectedFrame).then(canvas => {
        let link = document.createElement("a");
        link.download = "photostrip.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
